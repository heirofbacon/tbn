<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Weather Overlay</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><style>body,html{margin:0;padding:0;overflow:hidden;height:100%;background:transparent}#wBox{position:absolute;display:flex;align-items:center;gap:12px;padding:8px 16px;white-space:nowrap;transition:all .3s}.s-basic{text-shadow:0 0 8px rgba(0,0,0,0.8)}.s-bg{border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.5)}.s-blur{border-radius:12px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);box-shadow:0 8px 32px rgba(0,0,0,0.4)}</style></head><body><div id="wBox"><i class="fas fa-spinner fa-spin"></i> Loading...</div><script>function loadFont(f){if(!f||f==='Impact')return;const l=document.createElement('link');l.rel='stylesheet';l.href=`https://fonts.googleapis.com/css2?family=${f.replace(/ /g,'+')}&display=swap`;document.head.appendChild(l);}const p=new URLSearchParams(location.search);const loc=decodeURIComponent(p.get('loc')||'Phoenix').split(',')[0].trim();const font=p.get('font')||'Impact';const size=p.get('size')||40;const style=p.get('style')||'basic';const ref=(parseInt(p.get('ref'))||15)*60000;const tc=p.get('tc')||'#fff';const bc=p.get('bc')||'#000';const pos=p.get('pos')||'top-right';const mx=p.get('mx')||20;const my=p.get('my')||20;const sT=p.get('time')==='1';document.body.style.width='1920px';document.body.style.height='1080px';const b=document.getElementById('wBox');loadFont(font);b.style.fontSize=size+'px';b.style.fontFamily=`"${font}", sans-serif`;b.style.color=tc;if(style!=='basic'){b.style.background=style==='bg'?bc:bc+'80';}b.className=`s-${style}`;let t='auto',bot='auto',l='auto',r='auto';if(pos.includes('top'))t=my+'px';if(pos.includes('bottom'))bot=my+'px';if(pos.includes('left'))l=mx+'px';if(pos.includes('right'))r=mx+'px';b.style.top=t;b.style.bottom=bot;b.style.left=l;b.style.right=r;const iMap={0:'sun',1:'cloud-sun',2:'cloud-sun',3:'cloud',45:'smog',51:'cloud-rain',61:'cloud-showers-heavy',71:'snowflake',80:'cloud-rain',95:'bolt'};window.currTz=null;async function getW(){try{const gR=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(loc)}&count=1`);const gD=await gR.json();if(!gD.results)throw new Error();const{latitude,longitude,timezone}=gD.results[0];window.currTz=timezone;const wR=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code&temperature_unit=fahrenheit`);const wD=await wR.json();const temp=Math.round(wD.current.temperature_2m);const code=wD.current.weather_code;b.innerHTML=`<i class="fas fa-${iMap[code]||'sun'}"></i> ${temp}°F - ${loc}<span id="tP"></span>`;upTime();}catch(e){b.innerHTML='Weather Error';}}function upTime(){if(!sT||!window.currTz)return;const tStr=new Date().toLocaleTimeString('en-US',{timeZone:window.currTz,hour:'numeric',minute:'2-digit'});const tp=document.getElementById('tP');if(tp)tp.textContent=` | ${tStr}`;}getW();setInterval(getW,ref);setInterval(upTime,1000);</script></body></html>
