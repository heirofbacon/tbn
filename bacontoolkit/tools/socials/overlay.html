<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Socials Overlay</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/><style>body,html{margin:0;padding:0;overflow:hidden;height:100%;background:transparent}#container{position:absolute;white-space:nowrap;display:flex;align-items:center;justify-content:center;box-sizing:border-box}.social-item{display:none;flex-direction:row;align-items:center;gap:12px;box-sizing:border-box}.social-item img.svg-icon{width:1em;height:1em;object-fit:contain}.fa-kick::before{font-family:'Arial Black',sans-serif;font-weight:bold;content:'K';font-size:1.1em}</style></head><body><div id="container"></div><script>function loadFont(f){if(!f||f==='Impact')return;const l=document.createElement('link');l.rel='stylesheet';l.href=`https://fonts.googleapis.com/css2?family=${f.replace(/ /g,'+')}&display=swap`;document.head.appendChild(l);}const p=new URLSearchParams(location.search);let soc=[];try{soc=JSON.parse(decodeURIComponent(p.get('socials')||'[]'));}catch(e){}const size=parseFloat(p.get('size'))||40;const tOn=Math.max(1,parseFloat(p.get('tOn'))||8)*1000;const tOff=(parseFloat(p.get('tOff'))||2)*1000;const sInt=(parseFloat(p.get('sInt'))||3)*1000;const aI=p.get('aI')||'slideInLeft';const aO=p.get('aO')||'slideOutRight';const aS=p.get('aS')||'none';const font=p.get('font')||'Impact';const tC=p.get('tc')||'#fff';const iC=p.get('ic')||'#fff';const sh=p.get('sh')==='1';const ol=p.get('ol')==='1';const pos=p.get('pos')||'bottom-right';const mx=p.get('mx')||30;const my=p.get('my')||30;const w=p.get('w')||1920;const h=p.get('h')||1080;const useSvg=p.get('svg')==='1';const bgt=p.get('bgt')||'none';const bgc=p.get('bgc')||'#000000';const bgo=parseFloat(p.get('bgo'))||0.7;const bgi=p.get('bgi')||'';const bgr=p.get('bgr')||'16';const bgpx=p.get('bgpx')||'24';const bgpy=p.get('bgpy')||'12';document.body.style.width=w+'px';document.body.style.height=h+'px';const c=document.getElementById('container');loadFont(font);c.style.fontSize=size+'px';c.style.fontFamily=`"${font}", sans-serif`;let t='auto',b='auto',l='auto',r='auto',tx='0',ty='0';if(pos.includes('top'))t=my+'px';if(pos.includes('bottom'))b=my+'px';if(pos.includes('left'))l=mx+'px';if(pos.includes('right'))r=mx+'px';if(pos.includes('center')){if(pos.includes('top')||pos.includes('bottom')){l='50%';tx='-50%';}else if(pos.includes('left')||pos.includes('right')){t='50%';ty='-50%';}else{t='50%';l='50%';tx='-50%';ty='-50%';}}c.style.top=t;c.style.bottom=b;c.style.left=l;c.style.right=r;c.style.transform=`translate(${tx},${ty})`;const faMap={twitter:'fa-brands fa-x-twitter',twitch:'fa-brands fa-twitch',youtube:'fa-brands fa-youtube',discord:'fa-brands fa-discord',tiktok:'fa-brands fa-tiktok',instagram:'fa-brands fa-instagram',facebook:'fa-brands fa-facebook',whatsapp:'fa-brands fa-whatsapp',steam:'fa-brands fa-steam',xbox:'fa-brands fa-xbox',playstation:'fa-brands fa-playstation',snapchat:'fa-brands fa-snapchat',github:'fa-brands fa-github',cashapp:'fa-brands fa-cash-app',paypal:'fa-brands fa-paypal',venmo:'fa-brands fa-venmo-v',patreon:'fa-brands fa-patreon',kick:'fa-solid fa-kick',link:'fa-solid fa-link'};const svgs=['cashapp','discord','facebook','instagram','kick','snapchat','tiktok','twitch','twitter','youtube','paypal','venmo','xbox','playstation','steam','patreon','github'];let rbg=parseInt(bgc.slice(1,3),16),gbg=parseInt(bgc.slice(3,5),16),bbg=parseInt(bgc.slice(5,7),16),rgba=`rgba(${rbg},${gbg},${bbg},${bgo})`;if(soc.length===0)c.innerHTML='<div style="color:#fff;text-shadow:0 0 5px #000;">No socials</div>';else{soc.forEach(s=>{const d=document.createElement('div');d.className='social-item';if(bgt==='solid'){d.style.backgroundColor=rgba;}else if(bgt==='image'&&bgi){d.style.backgroundImage=`url("${bgi}")`;d.style.backgroundSize='cover';d.style.backgroundPosition='center';}if(bgt!=='none'){d.style.borderRadius=bgr+'px';d.style.padding=`${bgpy}px ${bgpx}px`;if(sh)d.style.boxShadow='0 8px 25px rgba(0,0,0,0.5)';}let tS=`color:${tC};`;if(sh)tS+=`text-shadow:0 0 8px rgba(0,0,0,0.8);`;if(ol)tS+=`-webkit-text-stroke:2px #000;`;if(s.platform==='custom-image'){d.innerHTML=`<img src="${s.handle}" style="max-height:${size*1.8}px;width:auto;object-fit:contain;">`;}else{let iH='';if(useSvg&&svgs.includes(s.platform)){const sn=s.platform==='twitter'?'x':s.platform;iH=`<img src="/bacontoolkit/images/${sn}.svg" class="svg-icon">`;}else{let iS=`color:${iC};`;if(sh)iS+=`text-shadow:0 0 8px rgba(0,0,0,0.8);`;if(ol)iS+=`-webkit-text-stroke:2px #000;`;iH=`<i class="${faMap[s.platform]||'fa-solid fa-link'}" style="${iS}"></i>`;}d.innerHTML=`${iH}<span style="${tS}">${s.handle}</span>`;}c.appendChild(d);});const items=c.querySelectorAll('.social-item');let cur=0;let statT=null;function show(){const ci=items[cur];if(!ci)return;ci.style.display='flex';ci.className=`social-item animate__animated animate__${aI}`;if(aS!=='none'&&sInt>0){statT=setInterval(()=>{ci.classList.remove(`animate__${aI}`,`animate__${aS}`);void ci.offsetWidth;ci.classList.add(`animate__${aS}`);},sInt);}setTimeout(()=>{if(statT)clearInterval(statT);ci.className=`social-item animate__animated animate__${aO}`;setTimeout(()=>{ci.style.display='none';ci.className='social-item';setTimeout(()=>{cur=(cur+1)%items.length;show();},tOff);},1000);},tOn);}show();}</script></body></html>
