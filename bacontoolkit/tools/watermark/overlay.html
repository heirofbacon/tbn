<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Watermark Overlay</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><style>body{margin:0;overflow:hidden;background:transparent!important;height:100vh;width:100vw}#watermark{position:absolute;white-space:nowrap;pointer-events:none;user-select:none;will-change:transform;text-shadow:0 0 10px rgba(0,0,0,0.8);padding:8px 12px;box-sizing:border-box}</style></head><body><div id="watermark" style="display:flex;align-items:center;gap:12px"><i id="iconElement"></i><span id="textElement"></span></div><script>function loadFont(f){if(!f||f==='Impact')return;const l=document.createElement('link');l.rel='stylesheet';l.href=`https://fonts.googleapis.com/css2?family=${f.replace(/ /g,'+')}&display=swap`;document.head.appendChild(l);}const el=document.getElementById('watermark');const iE=document.getElementById('iconElement');const tE=document.getElementById('textElement');const p=new URLSearchParams(window.location.search);const text=p.get('text')||'@heirofbacon';const size=parseFloat(p.get('size'))||50;const opacity=parseFloat(p.get('opacity'))||0.4;const speed=parseFloat(p.get('speed'))||2;const w=parseInt(p.get('w'))||1920;const h=parseInt(p.get('h'))||1080;const font=p.get('font')||'Impact';const color=p.get('color')||'#ffffff';const iconEn=p.get('iconEnabled')==='1';const iconClass=p.get('icon')||'fa-solid fa-bacon';loadFont(font);el.style.fontSize=size+'px';el.style.opacity=opacity;el.style.fontFamily=`"${font}", sans-serif`;el.style.color=color;document.body.style.width=w+'px';document.body.style.height=h+'px';if(text.match(/\.(jpeg|jpg|gif|png|webp|svg)$/i)){tE.innerHTML=`<img src="${text}" style="max-height:${size*1.5}px;width:auto;display:block;">`;}else{tE.textContent=text;}if(iconEn){iE.className=iconClass;iE.style.fontSize=(size*1.1)+'px';iE.style.display='block';}else{iE.style.display='none';}let x=Math.random()*(w-200);let y=Math.random()*(h-100);let dx=speed*(Math.random()>0.5?1:-1);let dy=speed*(Math.random()>0.5?1:-1);function bounce(){x+=dx;y+=dy;if(x<=0||x+el.offsetWidth>=w)dx=-dx;if(y<=0||y+el.offsetHeight>=h)dy=-dy;el.style.transform=`translate(${x}px, ${y}px)`;requestAnimationFrame(bounce);}window.addEventListener('load',bounce);</script></body></html>
